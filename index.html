<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fare Pro</title>

<style>
:root{
 --main:#7c7cff;
 --bg:#f2f2f7;
 --card:rgba(255,255,255,0.9);
 --good:#34c759;
 --mid:#ff9500;
 --bad:#ff3b30;
}

body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 background:var(--bg);
}

/* HEADER */
.header{
 position:sticky;
 top:0;
 padding:12px;
 text-align:center;
 font-weight:600;
 backdrop-filter:blur(12px);
 background:rgba(255,255,255,0.7);
 border-bottom:1px solid #eee;
}

/* CARD */
.box{
 margin:10px;
 padding:16px;
 border-radius:18px;
 background:var(--card);
 box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

/* TEXT */
.big{font-size:44px;font-weight:800;text-align:center;}
.mid{font-size:18px;font-weight:600;}
.small{font-size:14px;color:#666;text-align:center;}

/* STEP */
.stepWrap{
 display:flex;
 justify-content:space-between;
 align-items:center;
}
.stepBtn{
 width:64px;height:64px;
 border-radius:50%;
 border:none;
 font-size:26px;
 background:#e9e9f5;
}
.value{
 font-size:46px;
 font-weight:800;
}

/* SEGMENT */
.seg{
 display:flex;
 background:#e9e9f5;
 border-radius:12px;
 overflow:hidden;
 margin-top:8px;
}
.seg button{
 flex:1;
 padding:14px;
 border:none;
 font-size:16px;
 font-weight:600;
 background:transparent;
}
.seg .active{
 background:#fff;
 box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* INPUT */
input{
 width:100%;
 padding:14px;
 border-radius:12px;
 border:1px solid #ddd;
 margin-top:8px;
}

/* BUTTON */
.save{
 width:100%;
 padding:16px;
 border:none;
 border-radius:14px;
 background:var(--main);
 color:#fff;
 font-size:16px;
 margin-top:10px;
}
</style>
</head>

<body>

<div class="header" id="topbar">💬 Ready</div>

<!-- DIST -->
<div class="box">
<div class="mid">Distance (km)</div>
<div class="stepWrap">
<button class="stepBtn" id="minus">-</button>
<div id="d" class="value">6</div>
<button class="stepBtn" id="plus">+</button>
</div>
</div>

<!-- FUEL -->
<div class="box">
<div class="mid">Fuel Price (฿/L)</div>
<div class="stepWrap">
<button class="stepBtn" id="fminus">-</button>
<div id="f" class="value">43</div>
<button class="stepBtn" id="fplus">+</button>
</div>
</div>

<!-- MODE -->
<div class="box">
<div class="mid">Trip Type</div>
<div class="seg">
<button id="one">🚕 One Way</button>
<button id="round">🔁 Round Trip</button>
</div>
</div>

<!-- RESULT -->
<div class="box" id="res"></div>

<!-- ACTUAL -->
<div class="box">
<div class="mid">Actual Fare</div>
<input id="actual" type="number" placeholder="Optional">
<button class="save" onclick="save()">Save</button>
</div>

<script>
let d=6;
let f=43;
let mode="one";

let data=JSON.parse(localStorage.getItem("fareData"))||[];

/* ===================== */
/* UNIVERSAL BUTTON ENGINE */
/* ===================== */

let interval=null;

function attachHold(btn, fn){
 // click (tap once)
 btn.addEventListener("click", fn);

 // hold (continuous)
 btn.addEventListener("mousedown", ()=>startHold(fn));
 btn.addEventListener("touchstart", ()=>startHold(fn));

 // stop
 btn.addEventListener("mouseup", stopHold);
 btn.addEventListener("mouseleave", stopHold);
 btn.addEventListener("touchend", stopHold);
}

function startHold(fn){
 stopHold();
 interval=setInterval(fn,120);
}

function stopHold(){
 if(interval){
  clearInterval(interval);
  interval=null;
 }
}

/* ===================== */
/* DISTANCE */
/* ===================== */

function incD(){
 d++;
 if(d>30)d=30;
 updateD();
}
function decD(){
 d--;
 if(d<1)d=1;
 updateD();
}
function updateD(){
 document.getElementById("d").innerText=d;
 calc();
}

/* ===================== */
/* FUEL */
/* ===================== */

function incF(){
 f++;
 if(f>60)f=60;
 updateF();
}
function decF(){
 f--;
 if(f<30)f=30;
 updateF();
}
function updateF(){
 document.getElementById("f").innerText=f;
 calc();
}

/* attach buttons */
attachHold(document.getElementById("plus"), incD);
attachHold(document.getElementById("minus"), decD);
attachHold(document.getElementById("fplus"), incF);
attachHold(document.getElementById("fminus"), decF);

/* ===================== */
/* MODE */
/* ===================== */

one.onclick=()=>setMode("one");
round.onclick=()=>setMode("round");

function setMode(m){
 mode=m;
 one.classList.remove("active");
 round.classList.remove("active");
 document.getElementById(m).classList.add("active");
 calc();
}

/* ===================== */
/* TOP STATUS */
/* ===================== */

function setTop(t,c="#fff"){
 let el=document.getElementById("topbar");
 el.innerText=t;
 el.style.background=c;
}

/* ===================== */
/* CALC ENGINE */
/* ===================== */

function calc(){

 let fare=90+(d-6)*4;

 // fuel impact
 fare += (f-43)*0.8;

 // clamp
 if(fare<90) fare=90;
 if(d<=7 && fare>95) fare=95;
 if(d<=10 && fare>105) fare=105;
 if(d<=15 && fare>150) fare=150;

 let finalFare = mode==="round" ? (fare*2-15) : fare;

 let cost = d*(f/18);
 let profit = finalFare - (mode==="round"?cost*2:cost);

 document.getElementById("res").innerHTML=`
<div class="big">💰 ${Math.round(finalFare)}</div>
<div class="small">Cost ${Math.round(cost)} | Profit ${Math.round(profit)}</div>
`;

 if(profit>60){
  setTop("🟢 Good","#d4f8e8");
 }else if(profit<30){
  setTop("🔴 Low","#ffe5e5");
 }else{
  setTop("💬 OK","#f2f2f7");
 }

 return {fare:finalFare,cost};
}

/* ===================== */
/* SAVE */
/* ===================== */

function save(){
 let c=calc();
 let actual=+document.getElementById("actual").value || c.fare;

 data.push({
  fare:actual,
  profit:actual-c.cost,
  time:new Date().toISOString()
 });

 localStorage.setItem("fareData",JSON.stringify(data));

 setTop("✅ Saved","#e0f7ff");
 setTimeout(()=>setTop("💬 Ready","#f2f2f7"),1000);

 document.getElementById("actual").value="";
}

/* INIT */
setMode("one");
calc();
</script>

</body>
</html>
