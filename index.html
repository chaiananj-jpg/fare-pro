<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fare Pro</title>

<style>
:root{
 --main:#7c7cff;
 --bg:#f2f2f7;
 --card:rgba(255,255,255,0.9);
 --good:#34c759;
 --bad:#ff3b30;
}

body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 background:var(--bg);
}

/* HEADER (iOS glass) */
.header{
 position:sticky;
 top:0;
 padding:12px;
 text-align:center;
 font-weight:600;
 background:rgba(255,255,255,0.7);
 backdrop-filter:blur(12px);
 border-bottom:1px solid #eee;
}

/* CARD */
.box{
 margin:10px;
 padding:16px;
 border-radius:18px;
 background:var(--card);
 box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

/* TEXT */
.big{font-size:38px;font-weight:800;text-align:center;}
.mid{font-size:17px;font-weight:600;}
.small{font-size:13px;color:#666;text-align:center;}

/* STEP */
.stepWrap{
 display:flex;
 justify-content:space-between;
 align-items:center;
}
.stepBtn{
 width:62px;height:62px;
 border-radius:50%;
 border:none;
 font-size:24px;
 background:#e9e9f5;
}
.value{
 font-size:44px;
 font-weight:800;
}

/* SEGMENT */
.seg{
 display:flex;
 background:#e9e9f5;
 border-radius:12px;
 overflow:hidden;
 margin-top:10px;
}
.seg button{
 flex:1;
 padding:14px;
 border:none;
 background:transparent;
 font-size:16px;
 font-weight:600;
}
.seg .active{
 background:white;
 font-weight:700;
 box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* INPUT */
input{
 width:100%;
 padding:14px;
 border-radius:12px;
 border:1px solid #ddd;
 margin-top:8px;
}

/* BUTTON */
.save{
 width:100%;
 padding:16px;
 border:none;
 border-radius:14px;
 background:var(--main);
 color:white;
 font-size:16px;
 margin-top:10px;
}
</style>
</head>

<body>

<div class="header" id="topbar">💬 Ready to Quote</div>

<!-- DIST -->
<div class="box">
<div class="mid">Distance</div>
<div class="stepWrap">
<button class="stepBtn" onclick="change('d',-1)">-</button>
<div id="d" class="value">6</div>
<button class="stepBtn" onclick="change('d',1)">+</button>
</div>
</div>

<!-- FUEL -->
<div class="box">
<div class="mid">Fuel</div>
<div class="stepWrap">
<button class="stepBtn" onclick="change('f',-1)">-</button>
<div id="f" class="value">43</div>
<button class="stepBtn" onclick="change('f',1)">+</button>
</div>
</div>

<!-- MODE -->
<div class="box">
<div class="mid">Trip Type</div>
<div class="seg">
<button id="one" onclick="setMode('one')">🚕 One Way</button>
<button id="round" onclick="setMode('round')">🔁 Round Trip</button>
</div>
</div>

<!-- RESULT -->
<div class="box" id="res"></div>

<!-- ACTUAL -->
<div class="box">
<div class="mid">Actual Fare</div>
<input id="actual" type="number" placeholder="Enter actual fare">
<button class="save" onclick="save()">Save</button>
</div>

<script>
let mode="one";
let data=JSON.parse(localStorage.getItem("fareData"))||[];

/* CHANGE */
function change(id,val){
 let el=document.getElementById(id);
 let v=+el.innerText+val;
 if(v<1)v=1;if(v>100)v=100;
 el.innerText=v;
 calc();
}

/* MODE */
function setMode(m){
 mode=m;
 document.getElementById("one").classList.remove("active");
 document.getElementById("round").classList.remove("active");
 document.getElementById(m==="one"?"one":"round").classList.add("active");
 calc();
}

/* TOP */
function setTop(text,color){
 let t=document.getElementById("topbar");
 t.innerText=text;
 t.style.background=color;
}

/* CALC */
function calc(){
 let d=+document.getElementById("d").innerText;
 let f=+document.getElementById("f").innerText;

 let cost = d*(f/18);

 let oneFare = Math.max(90, 90 + (d-6)*5, cost + 25);

 let fare = mode==="round"
   ? (oneFare*2 - 20)
   : oneFare;

 let profit = fare - (mode==="round" ? cost*2 : cost);

 document.getElementById("res").innerHTML=`
<div class="big">💰 ${Math.round(fare)}</div>
<div class="small">
Cost ${Math.round(mode==="round"?cost*2:cost)} • Profit ${Math.round(profit)}
</div>
`;

 if(profit>60){
  setTop("🟢 Good Deal","#d4f8e8");
 }else if(profit<30){
  setTop("🔴 Low Profit","#ffe5e5");
 }else{
  setTop("💬 OK","#f2f2f7");
 }

 return {fare,cost};
}

/* SAVE */
function save(){
 let c=calc();
 let actual=+document.getElementById("actual").value||c.fare;

 data.push({
  fare:actual,
  profit:actual-c.cost,
  time:new Date().toISOString()
 });

 localStorage.setItem("fareData",JSON.stringify(data));

 setTop("✅ Saved","#e0f7ff");
 setTimeout(()=>setTop("💬 Ready to Quote","#f2f2f7"),1200);

 document.getElementById("actual").value="";
}

/* INIT */
setMode("one");
calc();
</script>

</body>
</html>
