<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fare Pro">
<meta name="theme-color" content="#7c7cff">

<title>Fare Pro</title>

<style>
:root{
 --main:#7c7cff;
 --bg:#f5f5fb;
 --card:rgba(255,255,255,0.95);
}

body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 background:var(--bg);
}

/* HEADER */
.header{
 position:sticky;
 top:0;
 padding:14px;
 text-align:center;
 font-weight:700;
 font-size:18px;
 background:rgba(255,255,255,0.7);
 backdrop-filter:blur(10px);
}

/* CARD */
.box{
 margin:10px 12px;
 padding:18px;
 border-radius:18px;
 background:var(--card);
 box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

/* TEXT */
.big{font-size:34px;font-weight:800;}
.mid{font-size:20px;}
.small{font-size:13px;color:#888;}

/* BUTTON */
button{
 border:none;
 border-radius:12px;
 padding:12px;
 font-size:15px;
 background:var(--main);
 color:white;
}
button:active{transform:scale(0.95)}

/* BOTTOM BAR */
.bottom{
 position:fixed;
 bottom:0;
 width:100%;
 background:white;
 padding:10px;
 display:flex;
 gap:8px;
 box-shadow:0 -5px 20px rgba(0,0,0,0.08);
}

/* RANGE */
input[type=range]{
 width:100%;
 accent-color:var(--main);
}

/* INPUT */
input{
 width:100%;
 padding:12px;
 border-radius:10px;
 border:1px solid #ddd;
 font-size:16px;
}

/* SEGMENT */
.seg{
 display:flex;
 background:#eee;
 border-radius:10px;
 overflow:hidden;
}
.seg button{
 flex:1;
 background:transparent;
 color:#333;
}
.seg .active{
 background:white;
 font-weight:600;
}

/* STATUS */
.good{color:#34c759}
.midc{color:#ff9500}
.bad{color:#ff3b30}

/* HISTORY */
.item{
 padding:10px;
 margin-top:6px;
 border-radius:12px;
 background:#fff;
}
</style>
</head>

<body>

<div class="header">🚕 Fare Pro</div>

<!-- SUMMARY -->
<div class="box" style="display:flex; justify-content:space-between; text-align:center;">
<div><div class="small">Fare</div><div id="sf" class="mid">-</div></div>
<div><div class="small">Cost</div><div id="sc" class="mid">-</div></div>
<div><div class="small">Profit</div><div id="sp" class="mid">-</div></div>
</div>

<!-- DISTANCE -->
<div class="box">
<div class="mid">📏 Distance: <b id="d">6</b> km</div>

<div style="display:flex; gap:6px; margin:8px 0;">
<button onclick="setDist(3)">3</button>
<button onclick="setDist(5)">5</button>
<button onclick="setDist(7)">7</button>
<button onclick="setDist(10)">10</button>
</div>

<input type="range" min="1" max="30" value="6" oninput="setDist(this.value)">
</div>

<!-- FUEL -->
<div class="box">
<div class="mid">⛽ Fuel: <b id="f">43</b></div>
<input type="range" min="30" max="60" value="43" oninput="setFuel(this.value)">
</div>

<!-- RESULT -->
<div class="box" id="res"></div>

<!-- ACTUAL -->
<div class="box">
<div class="mid">💵 Actual Fare</div>
<input id="actual" type="number" placeholder="Enter actual fare">
</div>

<!-- FILTER -->
<div class="box">
<div class="seg">
<button onclick="setView('day')" id="day">Day</button>
<button onclick="setView('week')" id="week">Week</button>
<button onclick="setView('month')" id="month">Month</button>
</div>
</div>

<!-- REPORT -->
<div class="box" id="report"></div>

<!-- HISTORY -->
<div class="box">
<div class="mid">📊 History</div>
<div id="history" class="small" style="text-align:center;padding:10px;">
Tap Day / Week / Month
</div>
</div>

<!-- BOTTOM ACTION -->
<div class="bottom">
<button style="flex:2;" onclick="save()">💾 Save</button>
<button style="flex:1;background:#ff3b30;" onclick="clearData()">🗑</button>
</div>

<script>

let data = JSON.parse(localStorage.getItem("fareData")) || [];
let view = null;

/* INPUT */
function setDist(v){
 document.getElementById("d").innerText=v;
 calc();
}
function setFuel(v){
 document.getElementById("f").innerText=v;
 calc();
}

/* CALC (improved formula) */
function calc(){

 let d=+document.getElementById("d").innerText;
 let f=+document.getElementById("f").innerText;

 let cost=d*(f/18)+50;

 let base = 95;
 let fare = Math.max(base + (d*4), cost + 30);

 let profit = fare - cost;

 let status = profit>40?"good":profit>25?"midc":"bad";

 document.getElementById("res").innerHTML=`
<div style="text-align:center;">
<div class="big">💰 ${fare}</div>
<div class="small">Recommended</div>
</div>

<div style="display:flex; justify-content:space-between; margin-top:10px;">
<div>Cost<br><b>${cost.toFixed(0)}</b></div>
<div>Profit<br><b>${profit.toFixed(0)}</b></div>
</div>

<div class="${status}" style="margin-top:8px;">
${status=="good"?"🟢 Good":status=="midc"?"🟡 OK":"🔴 Low"}
</div>
`;

 document.getElementById("sf").innerText=fare;
 document.getElementById("sc").innerText=cost.toFixed(0);
 document.getElementById("sp").innerText=profit.toFixed(0);

 return {fare,profit,d,cost};
}

/* SAVE */
function save(){
 let c=calc();
 let actual=+document.getElementById("actual").value || c.fare;

 data.push({
  fare:actual,
  profit:actual-c.cost,
  d:c.d,
  time:new Date().toISOString()
 });

 localStorage.setItem("fareData",JSON.stringify(data));

 document.getElementById("actual").value="";
 update();
}

/* VIEW */
function setView(v){
 view=v;

 document.querySelectorAll(".seg button")
 .forEach(b=>b.classList.remove("active"));

 document.getElementById(v).classList.add("active");

 update();
}

/* FILTER FIX */
function getData(){
 let now=new Date();

 return data.filter(x=>{
  let t=new Date(x.time);

  if(view==="day") return t.toDateString()===now.toDateString();

  if(view==="week"){
   let diff=(now-t)/(1000*60*60*24);
   return diff<=7;
  }

  if(view==="month"){
   return t.getMonth()===now.getMonth() &&
          t.getFullYear()===now.getFullYear();
  }
 });
}

/* UPDATE */
function update(){

 if(!view){
  history.innerHTML="Tap Day / Week / Month";
  report.innerHTML="";
  return;
 }

 let list=getData();

 if(list.length===0){
  history.innerHTML="📭 No data";
  report.innerHTML="";
  return;
 }

 let rev=list.reduce((a,b)=>a+b.fare,0);
 let prof=list.reduce((a,b)=>a+b.profit,0);

 report.innerHTML=`
<div>Trips: ${list.length}</div>
<div>Revenue: ${rev}</div>
<div>Profit: ${prof}</div>
`;

 let html="";
 list.slice().reverse().forEach(x=>{
  let t=new Date(x.time);

  html+=`
<div class="item">
<div style="display:flex; justify-content:space-between;">
<div>💰 ${x.fare}</div>
<div class="small">${t.toLocaleTimeString()}</div>
</div>
<div class="small">📏 ${x.d} km | Profit ${x.profit}</div>
</div>`;
 });

 history.innerHTML=html;
}

/* CLEAR */
function clearData(){
 if(confirm("Clear all data?")){
  localStorage.clear();
  data=[];
  update();
 }
}

calc();
update();

</script>

</body>
</html>
