<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fare Pro V5 Smart</title>

<style>
body { font-family:-apple-system; margin:0; background:#f2f2f7; }
.header { text-align:center; padding:12px; font-weight:600; }
.box { background:white; margin:10px; padding:14px; border-radius:14px; }
select, input { width:100%; padding:10px; margin-top:5px; border-radius:8px; border:1px solid #ddd; }
button { background:#007aff; color:white; border:none; border-radius:8px; padding:8px; margin:3px; }
.big { width:100%; height:44px; }
.smart-btn { background:#34c759; }
.item { padding:8px; margin-bottom:6px; background:#f9f9f9; border-radius:8px; }
.small { font-size:12px; color:#666; }
</style>
</head>

<body>

<div class="header">🚕 Fare Pro V5 Smart</div>

<div class="box">

<label>Preset Route</label>
<select id="route">
<option value="2">หน้ามอ → หอใน (2 km)</option>
<option value="6">หน้ามอ → บขส (6 km)</option>
<option value="8">หน้ามอ → แยกเกษตร (8 km)</option>
<option value="10">หน้ามอ → ตัวเมือง (10 km)</option>
</select>

<label>Manual km</label>
<input id="manualKm" placeholder="เช่น 7.5">

<label>Fuel</label>
<input id="fuel" value="43">

<button class="big" onclick="calc()">คำนวณ</button>

</div>

<div class="box">
🧠 Smart Route (ใช้บ่อย)
<div id="smartRoutes"></div>
</div>

<div class="box" id="res">📍 รอคำนวณ...</div>

<button class="big" onclick="saveTrip()">💾 บันทึก</button>

<div class="box">
📊 Trips: <b id="trips">0</b><br>
💰 Revenue: <b id="rev">0</b><br>
📈 Profit: <b id="profit">0</b><br>
⚖️ Avg: <b id="avg">0</b>
</div>

<div class="box">
🕒 History
<div id="history">📭 ไม่มีข้อมูล</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("fareData")) || [];
let lastCalc = null;

// ================= CALC =================
function calc(){

 let manual = document.getElementById("manualKm").value;
 let km = manual ? Number(manual) : Number(document.getElementById("route").value);
 let fuel = Number(document.getElementById("fuel").value);

 let k = 18;
 let cost = (km * (fuel/k)) + 50;

 let m;
 if(km <= 6) m = 35;
 else if(km <= 8) m = 30;
 else if(km <= 10) m = 25;
 else m = 20;

 let fare = Math.ceil(cost + m);
 let profit = fare - cost;

 lastCalc = {km, cost, fare, profit};

 document.getElementById("res").innerHTML = `
📏 ${km} km<br>
💰 ${fare} บาท<br>
📈 กำไร ${profit.toFixed(0)}
`;
}

// ================= SAVE =================
function saveTrip(){

 if(!lastCalc){
  alert("ยังไม่คำนวณ");
  return;
 }

 let real = prompt("ราคาจริง:", lastCalc.fare);
 if(real===null) return;

 real = Number(real);

 data.push({
  ...lastCalc,
  fareReal: real,
  profit: real - lastCalc.cost,
  time: new Date().toISOString()
 });

 localStorage.setItem("fareData", JSON.stringify(data));

 updateDash();
}

// ================= SMART ROUTE =================
function renderSmart(){

 let freq = {};

 data.forEach(x=>{
  let key = Math.round(x.km);
  freq[key] = (freq[key]||0)+1;
 });

 let top = Object.entries(freq)
  .sort((a,b)=>b[1]-a[1])
  .slice(0,5);

 document.getElementById("smartRoutes").innerHTML =
 top.map(x=>`
<button class="smart-btn" onclick="useSmart(${x[0]})">
${x[0]} km (${x[1]})
</button>
`).join("");
}

function useSmart(km){
 document.getElementById("manualKm").value = km;
 calc();
}

// ================= DASH =================
function updateDash(){

 let trips=data.length;
 let rev=data.reduce((a,b)=>a+b.fareReal,0);
 let profit=data.reduce((a,b)=>a+b.profit,0);

 document.getElementById("trips").innerText=trips;
 document.getElementById("rev").innerText=rev;
 document.getElementById("profit").innerText=profit;
 document.getElementById("avg").innerText=trips?Math.round(profit/trips):0;

 renderHistory();
 renderSmart();
}

// ================= HISTORY =================
function renderHistory(){

 if(data.length===0){
  document.getElementById("history").innerHTML="📭 ไม่มีข้อมูล";
  return;
 }

 document.getElementById("history").innerHTML =
 data.slice(-5).reverse().map(x=>{
  let t=new Date(x.time);
  let hh=String(t.getHours()).padStart(2,'0');
  let mm=String(t.getMinutes()).padStart(2,'0');

  return `
<div class="item">
🕒 ${hh}:${mm} 💰${x.fareReal}
<div class="small">${x.km} km | กำไร ${x.profit.toFixed(0)}</div>
</div>`;
 }).join("");
}

updateDash();

</script>

</body>
</html>
