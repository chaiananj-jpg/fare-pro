<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fare Pro">
<meta name="theme-color" content="#7c7cff">

<title>Fare Pro</title>

<style>
:root{
 --main:#7c7cff;
 --bg:#f2f2f7;
 --card:#ffffff;
 --good:#34c759;
 --mid:#ff9500;
 --bad:#ff3b30;
}

body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 background:var(--bg);
}

/* HEADER */
.header{
 position:sticky;
 top:0;
 padding:12px;
 text-align:center;
 font-weight:600;
 font-size:16px;
 background:rgba(255,255,255,0.85);
 backdrop-filter:blur(12px);
 border-bottom:1px solid #eee;
}

/* CARD */
.box{
 margin:10px;
 padding:16px;
 border-radius:16px;
 background:var(--card);
 box-shadow:0 3px 12px rgba(0,0,0,0.04);
}

/* TEXT */
.big{font-size:36px;font-weight:800;}
.mid{font-size:18px;font-weight:600;}
.small{font-size:13px;color:#666;}

/* STEP */
.stepWrap{
 display:flex;
 align-items:center;
 justify-content:space-between;
 margin-top:10px;
}
.stepBtn{
 width:60px;height:60px;
 border-radius:50%;
 border:none;
 font-size:24px;
 background:#e9e9f5;
}
.value{
 font-size:42px;
 font-weight:800;
}

/* RESULT */
.resultBox{
 text-align:center;
}
.subInfo{
 margin-top:6px;
 font-size:14px;
 color:#666;
}

/* INPUT */
input{
 width:100%;
 padding:14px;
 border-radius:12px;
 border:1px solid #ddd;
 font-size:16px;
 margin-top:8px;
}

/* SEGMENT */
.seg{
 display:flex;
 background:#e9e9f5;
 border-radius:12px;
 overflow:hidden;
}
.seg button{
 flex:1;
 border:none;
 padding:14px;
 font-size:17px;
 font-weight:600;
 background:transparent;
}
.seg .active{
 background:white;
 font-weight:700;
 box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* REPORT */
.report{
 font-size:15px;
 line-height:1.6;
}

/* HISTORY */
.item{
 background:#fafafa;
 padding:12px;
 margin-top:8px;
 border-radius:12px;
}

/* BOTTOM */
.bottom{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 gap:8px;
 padding:10px;
 background:white;
 border-top:1px solid #eee;
}
.bottom button{
 flex:1;
 padding:16px;
 border:none;
 border-radius:14px;
 font-size:16px;
 color:white;
}
.save{background:var(--main)}
.clear{background:#ff3b30}
</style>
</head>

<body>

<div class="header" id="topbar">🚕 Estimating Fare</div>

<!-- DIST -->
<div class="box">
<div class="mid">Distance</div>
<div class="stepWrap">
<button class="stepBtn" onclick="change('d',-1)">-</button>
<div id="d" class="value">6</div>
<button class="stepBtn" onclick="change('d',1)">+</button>
</div>
</div>

<!-- FUEL -->
<div class="box">
<div class="mid">Fuel</div>
<div class="stepWrap">
<button class="stepBtn" onclick="change('f',-1)">-</button>
<div id="f" class="value">43</div>
<button class="stepBtn" onclick="change('f',1)">+</button>
</div>
</div>

<!-- RESULT -->
<div class="box resultBox" id="res"></div>

<!-- ACTUAL -->
<div class="box">
<div class="mid">Actual Fare</div>
<input id="actual" type="number" placeholder="Enter actual fare">
</div>

<!-- FILTER -->
<div class="box">
<div class="seg">
<button onclick="setView('day')" id="day">Day</button>
<button onclick="setView('week')" id="week">Week</button>
<button onclick="setView('month')" id="month">Month</button>
</div>
</div>

<!-- REPORT -->
<div class="box report" id="report"></div>

<!-- HISTORY -->
<div class="box">
<div id="history" class="small">Tap Day / Week / Month</div>
</div>

<div class="bottom">
<button class="save" onclick="save()">Save</button>
<button class="clear" onclick="clearData()">Clear</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("fareData")) || [];
let view=null;

/* CHANGE */
function change(id,val){
 let el=document.getElementById(id);
 let v=+el.innerText+val;
 if(v<1)v=1;if(v>100)v=100;
 el.innerText=v;
 calc();
}

/* TOPBAR */
function setTop(text,color="#fff"){
 let t=document.getElementById("topbar");
 t.innerText=text;
 t.style.background=color;
}

/* CALC */
function calc(){
 let d=+document.getElementById("d").innerText;
 let f=+document.getElementById("f").innerText;

 let cost=d*(f/18)+50;
 let fare=Math.max(95+(d*4),cost+30);
 let profit=fare-cost;

 let status="mid";
 if(profit>40) status="good";
 else if(profit<25) status="bad";

 document.getElementById("res").innerHTML=`
<div class="big">💰 ${Math.round(fare)}</div>
<div class="subInfo">Cost ${cost.toFixed(0)} • Profit ${profit.toFixed(0)}</div>
`;

 if(status==="good"){
  setTop("🟢 Good Deal","#d4f8e8");
 }else if(status==="bad"){
  setTop("🔴 Low Profit","#ffe5e5");
 }else{
  setTop("💬 Ready to Quote","#f2f2f7");
 }

 return {fare,profit,cost};
}

/* SAVE */
function save(){
 let c=calc();
 let actual=+document.getElementById("actual").value||c.fare;

 data.push({
  fare:actual,
  profit:actual-c.cost,
  time:new Date().toISOString()
 });

 localStorage.setItem("fareData",JSON.stringify(data));

 setTop("✅ Trip Saved","#e0f7ff");
 setTimeout(()=>setTop("🚕 Estimating Fare"),1200);

 document.getElementById("actual").value="";
 update();
}

/* VIEW */
function setView(v){
 view=v;

 document.querySelectorAll(".seg button")
 .forEach(b=>b.classList.remove("active"));

 document.getElementById(v).classList.add("active");

 setTop("📊 "+v.toUpperCase());
 update();
}

/* FILTER */
function getData(){
 let now=new Date();
 return data.filter(x=>{
  let t=new Date(x.time);
  if(view==="day") return t.toDateString()===now.toDateString();
  if(view==="week") return (now-t)/(1000*60*60*24)<=7;
  if(view==="month") return t.getMonth()===now.getMonth() && t.getFullYear()===now.getFullYear();
 });
}

/* UPDATE */
function update(){
 if(!view){
  history.innerHTML="Tap Day / Week / Month";
  report.innerHTML="";
  return;
 }

 let list=getData();
 if(list.length===0){
  history.innerHTML="📭 No data";
  report.innerHTML="";
  return;
 }

 let rev=list.reduce((a,b)=>a+b.fare,0);
 let prof=list.reduce((a,b)=>a+b.profit,0);

 report.innerHTML=`Trips: ${list.length}<br>Revenue: ${rev}<br>Profit: ${prof}`;

 let html="";
 list.slice().reverse().forEach(x=>{
  let t=new Date(x.time);
  html+=`<div class="item">💰 ${x.fare}<br><span class="small">${t.toLocaleTimeString()}</span></div>`;
 });

 history.innerHTML=html;
}

/* INIT */
calc();
update();
</script>

</body>
</html>
