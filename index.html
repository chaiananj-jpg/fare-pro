<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fare Pro</title>

<style>
:root{
 --main:#7c7cff;
 --bg:#f2f2f7;
 --card:rgba(255,255,255,0.9);
}

body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 background:var(--bg);
}

/* HEADER */
.header{
 position:sticky;
 top:0;
 padding:12px;
 text-align:center;
 font-weight:600;
 background:rgba(255,255,255,0.7);
 backdrop-filter:blur(12px);
 border-bottom:1px solid #eee;
}

/* CARD */
.box{
 margin:10px;
 padding:16px;
 border-radius:18px;
 background:var(--card);
 box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

/* TEXT */
.big{font-size:38px;font-weight:800;text-align:center;}
.mid{font-size:18px;font-weight:600;}
.small{font-size:14px;color:#666;text-align:center;}

/* STEP */
.stepWrap{
 display:flex;
 justify-content:space-between;
 align-items:center;
}
.stepBtn{
 width:64px;height:64px;
 border-radius:50%;
 border:none;
 font-size:26px;
 background:#e9e9f5;
}
.value{
 font-size:44px;
 font-weight:800;
}

/* SEGMENT */
.seg{
 display:flex;
 background:#e9e9f5;
 border-radius:12px;
 overflow:hidden;
}
.seg button{
 flex:1;
 padding:14px;
 border:none;
 background:transparent;
 font-size:17px;
 font-weight:600;
}
.seg .active{
 background:white;
 font-weight:700;
 box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* HISTORY */
.item{
 background:#fafafa;
 padding:12px;
 margin-top:8px;
 border-radius:12px;
}

/* INPUT */
input{
 width:100%;
 padding:14px;
 border-radius:12px;
 border:1px solid #ddd;
 margin-top:8px;
}

/* BUTTON */
.save{
 width:100%;
 padding:16px;
 border:none;
 border-radius:14px;
 background:var(--main);
 color:white;
 font-size:16px;
 margin-top:10px;
}
</style>
</head>

<body>

<div class="header" id="topbar">💬 Ready</div>

<!-- DIST -->
<div class="box">
<div class="mid">Distance</div>
<div class="stepWrap">
<button class="stepBtn" id="minus">-</button>
<div id="d" class="value">6</div>
<button class="stepBtn" id="plus">+</button>
</div>
</div>

<!-- MODE -->
<div class="box">
<div class="mid">Trip Type</div>
<div class="seg">
<button id="one">One Way</button>
<button id="round">Round Trip</button>
</div>
</div>

<!-- RESULT -->
<div class="box" id="res"></div>

<!-- ACTUAL -->
<div class="box">
<div class="mid">Actual Fare</div>
<input id="actual" type="number">
<button class="save" onclick="save()">Save</button>
</div>

<!-- FILTER -->
<div class="box">
<div class="seg">
<button onclick="setView('day')" id="day">Day</button>
<button onclick="setView('week')" id="week">Week</button>
<button onclick="setView('month')" id="month">Month</button>
</div>
</div>

<!-- REPORT -->
<div class="box" id="report"></div>

<!-- HISTORY -->
<div class="box">
<div id="history" class="small">Tap Day / Week / Month</div>
</div>

<script>
let d=6;
let mode="one";
let view=null;
let data=JSON.parse(localStorage.getItem("fareData"))||[];

/* DOM FIX */
const historyEl = document.getElementById("history");
const reportEl = document.getElementById("report");

/* HOLD BUTTON */
let interval;
plus.onmousedown=()=>start(1);
minus.onmousedown=()=>start(-1);
document.onmouseup=stop;

function start(v){interval=setInterval(()=>change(v),120);}
function stop(){clearInterval(interval);}

/* CHANGE */
function change(v){
 d+=v;
 if(d<1)d=1;if(d>30)d=30;
 d=Math.round(d);
 document.getElementById("d").innerText=d;
 calc();
}

/* MODE */
one.onclick=()=>setMode("one");
round.onclick=()=>setMode("round");

function setMode(m){
 mode=m;
 one.classList.remove("active");
 round.classList.remove("active");
 document.getElementById(m).classList.add("active");
 calc();
}

/* TOP */
function setTop(t,c="#fff"){
 let el=document.getElementById("topbar");
 el.innerText=t;
 el.style.background=c;
}

/* CALC */
function calc(){
 let fare=90+(d-6)*4;

 if(fare<90) fare=90;
 if(d<=7 && fare>95) fare=95;
 if(d<=10 && fare>105) fare=105;
 if(d<=15 && fare>150) fare=150;

 let finalFare = mode==="round" ? (fare*2-15) : fare;

 let cost=d*(43/18);
 let profit=finalFare-(mode==="round"?cost*2:cost);

 res.innerHTML=`
<div class="big">💰 ${Math.round(finalFare)}</div>
<div class="small">Range ${Math.round(fare-5)} - ${Math.round(fare+5)}</div>
<div class="small">Profit ${Math.round(profit)}</div>
`;

 if(profit>60) setTop("🟢 Good","#d4f8e8");
 else if(profit<30) setTop("🔴 Low","#ffe5e5");
 else setTop("💬 OK","#f2f2f7");

 return {fare:finalFare,cost};
}

/* SAVE (FIXED) */
function save(){
 let c=calc();
 let actual=+document.getElementById("actual").value || c.fare;

 data.push({
  fare:actual,
  profit:actual-c.cost,
  time:new Date().toISOString()
 });

 localStorage.setItem("fareData",JSON.stringify(data));

 setTop("✅ Saved","#e0f7ff");
 setTimeout(()=>setTop("💬 Ready","#f2f2f7"),1000);

 document.getElementById("actual").value="";
 update();
}

/* VIEW */
function setView(v){
 view=v;

 document.querySelectorAll(".seg button")
 .forEach(b=>b.classList.remove("active"));

 document.getElementById(v).classList.add("active");

 update();
}

/* FILTER */
function getData(){
 let now=new Date();

 return data.filter(x=>{
  let t=new Date(x.time);

  if(view==="day") return t.toDateString()===now.toDateString();
  if(view==="week") return (now-t)/(1000*60*60*24)<=7;
  if(view==="month") return t.getMonth()===now.getMonth() && t.getFullYear()===now.getFullYear();
 });
}

/* UPDATE (FIXED) */
function update(){

 if(!view){
  historyEl.innerHTML="Tap Day / Week / Month";
  reportEl.innerHTML="";
  return;
 }

 let list=getData();

 if(list.length===0){
  historyEl.innerHTML="📭 No data";
  reportEl.innerHTML="";
  return;
 }

 let rev=list.reduce((a,b)=>a+b.fare,0);
 let prof=list.reduce((a,b)=>a+b.profit,0);

 reportEl.innerHTML=`Trips: ${list.length}<br>Revenue: ${rev}<br>Profit: ${prof}`;

 let html="";
 list.slice().reverse().forEach(x=>{
  let t=new Date(x.time);
  html+=`<div class="item">💰 ${x.fare}<br>${t.toLocaleTimeString()}</div>`;
 });

 historyEl.innerHTML=html;
}

/* INIT */
setMode("one");
calc();
update();
</script>

</body>
</html>
