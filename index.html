<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Fare Pro">
<meta name="theme-color" content="#7c7cff">

<title>Fare Pro</title>

<style>
:root{
 --main:#7c7cff;
 --bg:#f5f5fb;
 --card:rgba(255,255,255,0.95);
 --good:#34c759;
 --mid:#ff9500;
 --bad:#ff3b30;
}

body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 background:var(--bg);
}

/* HEADER */
.header{
 position:sticky;
 top:0;
 padding:14px;
 text-align:center;
 font-weight:700;
 font-size:16px;
 background:#fff;
 transition:.25s;
}

/* CARD */
.box{
 margin:10px;
 padding:16px;
 border-radius:18px;
 background:var(--card);
 box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

/* TEXT */
.big{font-size:34px;font-weight:800;}
.mid{font-size:18px;}
.small{font-size:13px;color:#888;}

/* STEP */
.stepWrap{
 display:flex;
 justify-content:space-between;
 align-items:center;
}
.stepBtn{
 width:55px;height:55px;
 border-radius:50%;
 border:none;
 font-size:22px;
 background:#e9e9f5;
}
.value{
 font-size:40px;
 font-weight:800;
}

/* INPUT */
input{
 width:100%;
 padding:12px;
 border-radius:10px;
 border:1px solid #ddd;
}

/* SEGMENT */
.seg{
 display:flex;
 background:#e9e9f5;
 border-radius:12px;
}
.seg button{
 flex:1;
 border:none;
 background:transparent;
 padding:10px;
}
.seg .active{
 background:white;
 font-weight:600;
}

/* HISTORY */
.item{
 background:white;
 padding:10px;
 margin-top:6px;
 border-radius:12px;
}

/* BOTTOM */
.bottom{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 gap:6px;
 padding:10px;
 background:white;
}
.bottom button{
 flex:1;
 padding:14px;
 border:none;
 border-radius:12px;
 color:white;
 font-size:16px;
}
.save{background:var(--main)}
.clear{background:#ff3b30}
</style>
</head>

<body>

<div class="header" id="topbar">🚕 Estimating Fare</div>

<!-- DIST -->
<div class="box">
<div class="mid">Distance</div>
<div class="stepWrap">
<button class="stepBtn" onclick="change('d',-1)">-</button>
<div id="d" class="value">6</div>
<button class="stepBtn" onclick="change('d',1)">+</button>
</div>
</div>

<!-- FUEL -->
<div class="box">
<div class="mid">Fuel</div>
<div class="stepWrap">
<button class="stepBtn" onclick="change('f',-1)">-</button>
<div id="f" class="value">43</div>
<button class="stepBtn" onclick="change('f',1)">+</button>
</div>
</div>

<!-- RESULT -->
<div class="box" id="res"></div>

<!-- ACTUAL -->
<div class="box">
<div class="mid">Actual Fare</div>
<input id="actual" type="number" placeholder="Enter actual fare">
</div>

<!-- FILTER -->
<div class="box">
<div class="seg">
<button onclick="setView('day')" id="day">Day</button>
<button onclick="setView('week')" id="week">Week</button>
<button onclick="setView('month')" id="month">Month</button>
</div>
</div>

<div class="box" id="report"></div>

<div class="box">
<div id="history" class="small">Tap Day / Week / Month</div>
</div>

<div class="bottom">
<button class="save" onclick="save()">Save</button>
<button class="clear" onclick="clearData()">Clear</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("fareData")) || [];
let view = null;

/* CHANGE VALUE */
function change(id,val){
 let el = document.getElementById(id);
 let v = +el.innerText + val;
 if(v<1)v=1;
 if(v>100)v=100;
 el.innerText = v;
 calc();
}

/* TOPBAR */
function setTop(text,color="#fff"){
 let t = document.getElementById("topbar");
 t.innerText = text;
 t.style.background = color;
}

/* CALC */
function calc(){
 let d = +document.getElementById("d").innerText;
 let f = +document.getElementById("f").innerText;

 let cost = d*(f/18)+50;
 let fare = Math.max(95 + (d*4), cost + 30);
 let profit = fare - cost;

 let status="mid";
 if(profit>40) status="good";
 else if(profit<25) status="bad";

 document.getElementById("res").innerHTML=`
<div class="big">💰 ${Math.round(fare)}</div>
<div class="small">Cost ${cost.toFixed(0)} | Profit ${profit.toFixed(0)}</div>
`;

 if(status==="good"){
  setTop("🟢 Good Deal","#d4f8e8");
 }else if(status==="bad"){
  setTop("🔴 Low Profit","#ffe5e5");
 }else{
  setTop("💬 Ready to Quote","#f2f2f7");
 }

 return {fare,profit,cost};
}

/* SAVE */
function save(){
 let c = calc();
 let actual = +document.getElementById("actual").value || c.fare;

 data.push({
  fare: actual,
  profit: actual - c.cost,
  time: new Date().toISOString()
 });

 localStorage.setItem("fareData", JSON.stringify(data));

 setTop("✅ Trip Saved","#e0f7ff");

 setTimeout(()=>setTop("🚕 Estimating Fare"),1200);

 document.getElementById("actual").value="";
 update();
}

/* VIEW */
function setView(v){
 view=v;

 document.querySelectorAll(".seg button")
 .forEach(b=>b.classList.remove("active"));

 document.getElementById(v).classList.add("active");

 setTop("📊 "+v.toUpperCase());

 update();
}

/* FILTER (FIXED LOGIC) */
function getData(){
 let now=new Date();

 return data.filter(x=>{
  let t=new Date(x.time);

  if(view==="day"){
   return t.toDateString()===now.toDateString();
  }

  if(view==="week"){
   let diff=(now - t)/(1000*60*60*24);
   return diff<=7;
  }

  if(view==="month"){
   return t.getMonth()===now.getMonth() &&
          t.getFullYear()===now.getFullYear();
  }
 });
}

/* UPDATE */
function update(){

 if(!view){
  history.innerHTML="Tap Day / Week / Month";
  report.innerHTML="";
  return;
 }

 let list=getData();

 if(list.length===0){
  history.innerHTML="📭 No data";
  report.innerHTML="";
  return;
 }

 let rev=list.reduce((a,b)=>a+b.fare,0);
 let prof=list.reduce((a,b)=>a+b.profit,0);

 report.innerHTML=`
<div>Trips: ${list.length}</div>
<div>Revenue: ${rev}</div>
<div>Profit: ${prof}</div>
`;

 let html="";
 list.slice().reverse().forEach(x=>{
  let t=new Date(x.time);

  html+=`
<div class="item">
🕒 ${t.toLocaleTimeString()}
<span style="float:right;">💰${x.fare}</span><br>
<span class="small">Profit ${x.profit}</span>
</div>`;
 });

 history.innerHTML=html;
}

/* INIT */
calc();
update();
</script>

</body>
</html>
