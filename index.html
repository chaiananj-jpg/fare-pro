<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fare Pro V6</title>

<style>
body {
 font-family:-apple-system, sans-serif;
 margin:0;
 background:#f2f2f7;
}
.box {
 background:white;
 margin:12px;
 padding:16px;
 border-radius:20px;
}
.row {
 display:flex;
 justify-content:space-between;
 align-items:center;
}
.value { font-size:26px; font-weight:bold; }

button {
 border:none;
 border-radius:12px;
 background:#007aff;
 color:white;
 padding:8px 12px;
}

.big {
 width:100%;
 height:50px;
 margin-top:10px;
}

.segWrap {
 display:flex;
 background:#e5e5ea;
 border-radius:10px;
 padding:3px;
}
.seg {
 flex:1;
 background:transparent;
 color:black;
}
.seg.active {
 background:white;
}

.card {
 padding:10px;
 border-radius:12px;
 background:#f9f9f9;
 margin-bottom:6px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">🚕 Fare Pro V6</h2>

<!-- INPUT -->
<div class="box">
<div class="row">
Pickup
<div>
<button onclick="chg('p',-1)">-</button>
<span id="p" class="value">2</span>
<button onclick="chg('p',1)">+</button>
</div>
</div>
</div>

<div class="box">
<div class="row">
Drop
<div>
<button onclick="chg('d',-1)">-</button>
<span id="d" class="value">6</span>
<button onclick="chg('d',1)">+</button>
</div>
</div>
</div>

<div class="box">
<div class="row">
Fuel
<div>
<button onclick="chg('f',-1)">-</button>
<span id="f" class="value">43</span>
<button onclick="chg('f',1)">+</button>
</div>
</div>
</div>

<!-- RESULT -->
<div class="box" id="res"></div>

<button class="big" onclick="saveTrip()">💾 Save</button>

<!-- FILTER -->
<div class="box">
<div class="segWrap">
<button class="seg active" onclick="setFilter('day')" id="f_day">Day</button>
<button class="seg" onclick="setFilter('week')" id="f_week">Week</button>
<button class="seg" onclick="setFilter('month')" id="f_month">Month</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="box">
Trips: <span id="trips">0</span><br>
Revenue: <span id="rev">0</span><br>
Profit: <span id="profit">0</span><br>
Avg: <span id="avg">0</span>
</div>

<!-- HISTORY -->
<div class="box">
<div id="history"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("fareData")) || [];
let filter = "day";

function chg(id,v){
 let el = document.getElementById(id);
 let n = parseFloat(el.innerText) + v;
 if(n<0)n=0;
 el.innerText = n;
 calc();
}

function calc(){

 let p = +pEl().innerText;
 let d = +dEl().innerText;
 let f = +fEl().innerText;

 let cost = (d+p)*(f/18)+50;
 let fare = Math.ceil(cost + 30);
 let profit = fare - cost;

 document.getElementById("res").innerHTML =
 `ราคา ${fare} บาท<br>กำไร ${profit.toFixed(0)}`;

 return {fare, profit, d};
}

function saveTrip(){

 let r = calc();

 let realFare = prompt("ค่าโดยสารจริง", r.fare);
 if(!realFare) return;

 data.push({
   fare: +realFare,
   profit: realFare - (r.fare - r.profit),
   d: r.d,
   time: new Date().toISOString()
 });

 localStorage.setItem("fareData", JSON.stringify(data));
 updateDash();
}

function setFilter(f){
 filter=f;

 document.getElementById("f_day").classList.remove("active");
 document.getElementById("f_week").classList.remove("active");
 document.getElementById("f_month").classList.remove("active");

 document.getElementById("f_"+f).classList.add("active");

 updateDash();
}

function filterData(){

 let now = new Date();

 return data.filter(x=>{
   let t = new Date(x.time);

   if(filter==="day"){
     return t.toDateString() === now.toDateString();
   }

   if(filter==="week"){
     let diff = (now - t)/(1000*60*60*24);
     return diff <= 7;
   }

   if(filter==="month"){
     return t.getMonth() === now.getMonth();
   }

 });
}

function updateDash(){

 let d = filterData();

 if(d.length===0){
  history.innerHTML = "📭 ไม่มีข้อมูล";
  trips.innerText=0;
  rev.innerText=0;
  profit.innerText=0;
  avg.innerText=0;
  return;
 }

 let tripsN = d.length;
 let revN = d.reduce((a,b)=>a+b.fare,0);
 let profitN = d.reduce((a,b)=>a+b.profit,0);

 trips.innerText = tripsN;
 rev.innerText = revN;
 profit.innerText = profitN;
 avg.innerText = Math.round(profitN/tripsN);

 history.innerHTML = d.slice(-10).reverse().map(x=>{

   let t = new Date(x.time);

   return `
<div class="card" onclick="showDetail('${x.time}')">
🕒 ${t.getHours()}:${t.getMinutes()}  
💰 ${x.fare}<br>
กำไร ${x.profit}
</div>
`;

 }).join("");
}

function showDetail(time){

 let x = data.find(i=>i.time===time);

 alert(
`เวลา: ${new Date(x.time).toLocaleString()}
ระยะ: ${x.d} km
รายรับ: ${x.fare}
กำไร: ${x.profit}`
);
}

function pEl(){ return document.getElementById("p"); }
function dEl(){ return document.getElementById("d"); }
function fEl(){ return document.getElementById("f"); }

updateDash();
calc();

</script>

</body>
</html>
