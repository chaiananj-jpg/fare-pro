<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fare Pro+</title>

<style>
body {
 font-family:-apple-system, BlinkMacSystemFont, sans-serif;
 margin:0;
 background:#f2f2f7;
}

h2 {
 text-align:center;
 margin:15px 0;
 font-weight:600;
}

.box {
 background:rgba(255,255,255,0.7);
 backdrop-filter: blur(10px);
 margin:12px;
 padding:16px;
 border-radius:20px;
 box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

.row {
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.value {
 font-size:28px;
 font-weight:600;
}

button {
 border:none;
 border-radius:14px;
 background:#007aff;
 color:white;
 font-size:18px;
}

button:active {
 transform:scale(0.96);
 opacity:0.9;
}

.big {
 width:100%;
 height:56px;
 margin-top:10px;
 font-size:18px;
 font-weight:600;
}

.toggle {
 width:48%;
 height:50px;
}

.active {
 background:#34c759;
}

.warn { color:#ff3b30; font-weight:600; }
.mid { color:#ff9500; font-weight:600; }
.good { color:#34c759; font-weight:600; }
.seg {
 background:transparent;
 color:#000;
 border-radius:10px;
 height:40px;
}

.seg.active {
 background:white;
 box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
</style>
</head>

<body>
<div style="
position:sticky;
top:0;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(10px);
padding:10px;
text-align:center;
font-weight:600;
border-bottom:1px solid #eee;
z-index:10;
">
🚕 Fare Pro
</div>
<h2>🚕 Fare Pro</h2>

<!-- INPUT -->
<div class="box">
<div class="row">
<span>📍Pickup</span>
<div>
<button onclick="chg('p',-1)">-</button>
<span class="value" id="p">2</span>
<button onclick="chg('p',1)">+</button>
</div>
</div>
</div>

<div class="box">
<div class="row">
<span>🏁Drop</span>
<div>
<button onclick="chg('d',-1)">-</button>
<span class="value" id="d">6</span>
<button onclick="chg('d',1)">+</button>
</div>
</div>
</div>

<div class="box">
<div class="row">
<span>⛽Fuel</span>
<div>
<button onclick="chg('f',-1)">-</button>
<span class="value" id="f">43</span>
<button onclick="chg('f',1)">+</button>
</div>
</div>
</div>

<!-- TRIP TYPE -->
<div class="box">
<div style="
display:flex;
background:#e5e5ea;
border-radius:12px;
padding:3px;
">
<button id="one" onclick="tripType('one')" class="seg active">เที่ยวเดียว</button>
<button id="round" onclick="tripType('round')" class="seg">ไป-กลับ</button>
</div>
</div>

<!-- RESULT -->
<div class="box" id="res"></div>

<!-- ACTION -->
<button class="big" onclick="saveTrip()">💾 บันทึก</button>
<button class="big" style="background:#ff3b30;" onclick="clearData()">🗑 ล้าง</button>

<!-- DASHBOARD -->
<div class="box">
<div style="display:flex; justify-content:space-between;">

<div>
<div style="font-size:12px;color:#888;">Trips</div>
<div style="font-size:20px;"><b id="trips">0</b></div>
</div>
<div>
<div style="font-size:12px;color:#888;">Revenue</div>
<div style="font-size:20px;"><b id="rev">0</b></div>
</div>

<div>
<div style="font-size:12px;color:#888;">Profit</div>
<div style="font-size:20px;"><b id="profit">0</b></div>
</div>

<div>
<div style="font-size:12px;color:#888;">Avg</div>
<div style="font-size:20px;"><b id="avg">0</b></div>
</div>

</div>
</div>

<div class="box">
📅 วันนี้<br>
Trips: <span id="t_trips">-</span><br>
Revenue: <span id="t_rev">-</span><br>
Profit: <span id="t_profit">-</span>
</div>

<div class="box">
🕒 ล่าสุด
<div id="history" style="color:#888;text-align:center;">
📭 ยังไม่มีข้อมูล
</div>
</div>

<script>

let trip="one";
let data = JSON.parse(localStorage.getItem("fareData")) || [];

function chg(id,v){
 let el=document.getElementById(id);
 let n=parseFloat(el.innerText)+v;
 if(n<0)n=0;
 el.innerText=n.toFixed(1).replace('.0','');
 calc();
}

function tripType(t){
 trip=t;
 document.getElementById("one").classList.remove("active");
 document.getElementById("round").classList.remove("active");
 document.getElementById(t).classList.add("active");
 calc();
}

function calc(){

 let p = +document.getElementById("p").innerText;
 let d = +document.getElementById("d").innerText;
 let f = +document.getElementById("f").innerText;

 let k = 18;

 let dist = d + p + (d * 0.25);
 if(trip==="round") dist *= 1.5;

 let cost = (dist * (f/k)) + 50;

 let m;
 if(d <= 6) m = 35;
 else if(d <= 8) m = 30;
 else if(d <= 10) m = 25;
 else m = 20;

 let safeFare = Math.ceil(cost + m);

 let marketFare;
 if(d <= 6) marketFare = 95;
 else if(d <= 8) marketFare = 100;
 else if(d <= 10) marketFare = 110;
 else marketFare = 130;

 let fare = Math.max(safeFare, marketFare);
 if(trip==="round") fare += 40;

 let profit = fare - cost;

 let low = Math.floor(fare - 5);
 let mid = fare;
 let high = fare + 5;

 let status, label;
 if(profit < m){
   status="warn"; label="🔴 เสี่ยงขาดทุน";
 } else if(profit < m+10){
   status="mid"; label="🟡 พอดี";
 } else{
   status="good"; label="🟢 กำไรดี";
 }

 let percent = Math.min(100, Math.max(0, (profit / (m+20)) * 100));

document.getElementById("res").innerHTML = `
<div style="font-size:18px;">
💰 <b style="font-size:28px;">${fare}</b> บาท
</div>

<div style="margin-top:8px;">
💸 ต้นทุน ${cost.toFixed(0)} บาท<br>
📈 กำไร ${profit.toFixed(0)} บาท
</div>

<div class="${status}" style="margin-top:8px;">
${label}
</div>

<div style="margin-top:12px;">
<div style="height:8px;background:#e5e5ea;border-radius:10px;">
<div style="width:${percent}%;height:8px;background:${status==='good'?'#34c759':status==='mid'?'#ff9500':'#ff3b30'};border-radius:10px;"></div>
</div>
</div>

<hr style="margin:12px 0;">

<div style="font-size:14px;color:#666;">
📞 แนะนำราคา
</div>

<div style="margin-top:5px;">
🔴 ${low} | 🟡 ${mid} | 🟢 ${high}
</div>
`;
 return {fare, profit, d};
}
function saveTrip(){

 let r = calc();

 data.push({
   fare: r.fare,
   profit: r.profit,
   d: r.d,
   time: new Date().toISOString()
 });

 localStorage.setItem("fareData", JSON.stringify(data));
 updateDash();

 alert("บันทึกแล้ว");
}
function quickSave(price){

 let p = calc();

 data.push({
   fare: price,
   profit: price - (p.fare - p.profit), // recalculated
   d: p.d,
   time: new Date().toISOString()
 });

 localStorage.setItem("fareData", JSON.stringify(data));
 updateDash();

 navigator.vibrate?.(50); // Android

 alert("บันทึก "+price+" บาท");
}
function clearData(){
 if(confirm("ลบข้อมูลทั้งหมด?")){
   localStorage.clear();
   data = [];
   updateDash();
 }
}

function updateDash(){
if(data.length === 0){
 document.getElementById("history").innerHTML = `
<div style="text-align:center;color:#999;padding:10px;">
📭 ยังไม่มีงาน<br>
<small>เริ่มบันทึกเพื่อดูรายงาน</small>
</div>`;
}
 
 let trips = data.length;
 let rev = data.reduce((a,b)=>a+b.fare,0);
 let profit = data.reduce((a,b)=>a+b.profit,0);

 document.getElementById("trips").innerText=trips;
 document.getElementById("rev").innerText=rev;
 document.getElementById("profit").innerText=profit;
 document.getElementById("avg").innerText=Math.round(profit/trips);

 let today = new Date().toDateString();
 let todayData = data.filter(x=> new Date(x.time).toDateString()===today);

 document.getElementById("t_trips").innerText=todayData.length;
 document.getElementById("t_rev").innerText=todayData.reduce((a,b)=>a+b.fare,0);
 document.getElementById("t_profit").innerText=todayData.reduce((a,b)=>a+b.profit,0);

 let last5 = data.slice(-5).reverse();

 let html = last5.map((x,i)=>{
 let t=new Date(x.time);
 let hh=t.getHours().toString().padStart(2,'0');
 let mm=t.getMinutes().toString().padStart(2,'0');

 return `
<div style="
padding:10px;
margin-bottom:5px;
background:${i===0?'#f2f2f7':'white'};
border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.05);
">
🕒 ${hh}:${mm}  
<span style="float:right;">💰${x.fare}</span><br>
<span style="color:#888;">กำไร ${x.profit}</span>
</div>
`;
}).join("");
 

 document.getElementById("history").innerHTML=html;
}

updateDash();
calc();

</script>

</body>
</html>
