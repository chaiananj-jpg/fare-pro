<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fare Pro V10</title>

<style>
:root{
 --bg:#f2f2f7;
 --card:#ffffffcc;
 --text:#000;
 --sub:#666;
 --blue:#007aff;
}

@media (prefers-color-scheme: dark){
 :root{
  --bg:#1c1c1e;
  --card:#2c2c2ecc;
  --text:#fff;
  --sub:#aaa;
 }
}

body{
 margin:0;
 font-family:-apple-system;
 background:var(--bg);
 color:var(--text);
}

.header{
 text-align:center;
 padding:14px;
 font-size:20px;
 font-weight:600;
 backdrop-filter:blur(10px);
 position:sticky;
 top:0;
}

.box{
 background:var(--card);
 backdrop-filter:blur(20px);
 margin:12px;
 padding:16px;
 border-radius:18px;
}

.value{
 font-size:36px;
 text-align:center;
 font-weight:700;
}

input{
 width:100%;
 padding:12px;
 font-size:18px;
 border-radius:10px;
 border:none;
 margin-top:8px;
}

button{
 width:100%;
 padding:14px;
 font-size:18px;
 border:none;
 border-radius:14px;
 margin-top:10px;
 background:var(--blue);
 color:white;
}

button:active{
 transform:scale(0.97);
}

.segWrap{
 display:flex;
 margin:12px;
 background:#8882;
 border-radius:12px;
 padding:3px;
}

.seg{
 flex:1;
 background:transparent;
 border:none;
 padding:10px;
 border-radius:10px;
}

.seg.active{
 background:white;
 color:black;
}

.card{
 padding:14px;
 border-radius:14px;
 margin-bottom:8px;
 background:var(--card);
}

.small{ color:var(--sub); font-size:13px; }

.grid{
 display:flex;
 justify-content:space-between;
 text-align:center;
}

.metric b{
 font-size:20px;
}
</style>
</head>

<body>

<div class="header">🚕 Fare Pro V10</div>

<!-- DISTANCE -->
<div class="box">
<div class="small">Distance</div>
<input type="range" min="1" max="20" value="6" oninput="setD(this.value)">
<div class="value" id="dVal">6 km</div>
</div>

<!-- FUEL -->
<div class="box">
<div class="small">Fuel (บาท/ลิตร)</div>
<input id="f" value="43">
</div>

<!-- RESULT -->
<div class="box" id="res"></div>

<!-- ACTUAL -->
<div class="box">
<div class="small">Actual Fare</div>
<input id="actual">
</div>

<button onclick="save()">Save</button>

<!-- FILTER -->
<div class="segWrap">
<button class="seg active" id="day" onclick="setFilter('day')">Day</button>
<button class="seg" id="week" onclick="setFilter('week')">Week</button>
<button class="seg" id="month" onclick="setFilter('month')">Month</button>
</div>

<!-- DASHBOARD -->
<div class="box grid">
<div class="metric">Trips<br><b id="trips">0</b></div>
<div class="metric">Revenue<br><b id="rev">0</b></div>
<div class="metric">Profit<br><b id="profit">0</b></div>
<div class="metric">Avg<br><b id="avg">0</b></div>
</div>

<!-- HISTORY -->
<div class="box" id="history"></div>

<script>

let data=JSON.parse(localStorage.getItem("fareData"))||[];
let d=6,filter="day";

function setD(v){
 d=Number(v);
 document.getElementById("dVal").innerText=d+" km";
 calc();
}

function smart(d){
 let s=data.filter(x=>Math.abs(x.d-d)<=1);
 if(s.length){
  return Math.round(s.reduce((a,b)=>a+b.fare,0)/s.length);
 }
 return null;
}

function calc(){

 let f=Number(document.getElementById("f").value);
 let dist=d+(d*0.25);
 let cost=(dist*(f/18))+50;

 let fare=Math.max(Math.ceil(cost+30),100);
 let profit=fare-cost;

 document.getElementById("res").innerHTML=`
<div class="value">${fare}</div>
<div class="small">Cost ${cost.toFixed(0)} • Profit ${profit.toFixed(0)}</div>
`;

 document.getElementById("actual").value=smart(d)||fare;

 return {fare,cost};
}

function save(){
 let r=calc();
 let actual=Number(document.getElementById("actual").value)||r.fare;

 data.push({
  fare:actual,
  cost:r.cost,
  profit:actual-r.cost,
  d:d,
  time:new Date().toISOString()
 });

 localStorage.setItem("fareData",JSON.stringify(data));
 update();
}

function setFilter(f){
 filter=f;
 document.querySelectorAll(".seg").forEach(x=>x.classList.remove("active"));
 document.getElementById(f).classList.add("active");
 update();
}

function getData(){
 let now=new Date();
 return data.filter(x=>{
  let t=new Date(x.time);
  if(filter==="day") return t.toDateString()===now.toDateString();
  if(filter==="week") return (now-t)/(1000*60*60*24)<=7;
  if(filter==="month") return t.getMonth()===now.getMonth();
 });
}

function update(){

 let list=getData();

 let trips=list.length;
 let rev=list.reduce((a,b)=>a+b.fare,0);
 let profit=list.reduce((a,b)=>a+b.profit,0);

 document.getElementById("trips").innerText=trips;
 document.getElementById("rev").innerText=rev;
 document.getElementById("profit").innerText=profit;
 document.getElementById("avg").innerText=trips?Math.round(profit/trips):0;

 document.getElementById("history").innerHTML=list.slice(-10).reverse().map(x=>{
 let t=new Date(x.time);
 let hh=t.getHours().toString().padStart(2,'0');
 let mm=t.getMinutes().toString().padStart(2,'0');

 return `
<div class="card" onclick="edit(${data.indexOf(x)})">
🕒 ${hh}:${mm}
<span style="float:right;">${x.fare}</span>
<div class="small">km ${x.d} • profit ${x.profit.toFixed(0)}</div>
</div>
`;
 }).join("")||"📭 No data";
}

function edit(i){
 let x=data[i];
 let nf=prompt(`Edit Fare\nKM:${x.d}\nCost:${x.cost.toFixed(0)}`,x.fare);
 if(nf){
  x.fare=Number(nf);
  x.profit=x.fare-x.cost;
  localStorage.setItem("fareData",JSON.stringify(data));
  update();
 }
}

update();
calc();

</script>

</body>
</html>
