<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fare Pro</title>

<style>
:root{
 --main:#7c7cff;
 --bg:#f2f2f7;
 --card:rgba(255,255,255,0.9);
 --good:#34c759;
 --mid:#ff9500;
 --bad:#ff3b30;
}

body{
 margin:0;
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 background:var(--bg);
}

/* HEADER */
.header{
 position:sticky;
 top:0;
 padding:12px;
 text-align:center;
 font-weight:600;
 background:rgba(255,255,255,0.7);
 backdrop-filter:blur(12px);
 border-bottom:1px solid #eee;
 transition:.2s;
}

/* CARD */
.box{
 margin:10px;
 padding:16px;
 border-radius:18px;
 background:var(--card);
 box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

/* TEXT */
.big{font-size:40px;font-weight:800;text-align:center;}
.mid{font-size:17px;font-weight:600;}
.small{font-size:13px;color:#666;text-align:center;}

/* STEP */
.stepWrap{
 display:flex;
 justify-content:space-between;
 align-items:center;
}
.stepBtn{
 width:64px;height:64px;
 border-radius:50%;
 border:none;
 font-size:26px;
 background:#e9e9f5;
}
.value{
 font-size:46px;
 font-weight:800;
}

/* SEGMENT */
.seg{
 display:flex;
 background:#e9e9f5;
 border-radius:12px;
 overflow:hidden;
 margin-top:10px;
}
.seg button{
 flex:1;
 padding:14px;
 border:none;
 background:transparent;
 font-size:16px;
 font-weight:600;
}
.seg .active{
 background:white;
 font-weight:700;
 box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* INPUT */
input{
 width:100%;
 padding:14px;
 border-radius:12px;
 border:1px solid #ddd;
 margin-top:8px;
}

/* BUTTON */
.save{
 width:100%;
 padding:16px;
 border:none;
 border-radius:14px;
 background:var(--main);
 color:white;
 font-size:16px;
 margin-top:10px;
}
</style>
</head>

<body>

<div class="header" id="topbar">💬 Ready</div>

<!-- DIST -->
<div class="box">
<div class="mid">Distance</div>
<div class="stepWrap">
<button class="stepBtn" id="minus">-</button>
<div id="d" class="value">6</div>
<button class="stepBtn" id="plus">+</button>
</div>
</div>

<!-- MODE -->
<div class="box">
<div class="mid">Trip Type</div>
<div class="seg">
<button id="one">🚕 One Way</button>
<button id="round">🔁 Round Trip</button>
</div>
</div>

<!-- RESULT -->
<div class="box" id="res"></div>

<!-- ACTUAL -->
<div class="box">
<div class="mid">Actual Fare</div>
<input id="actual" type="number" placeholder="Enter actual fare">
<button class="save" onclick="save()">Save</button>
</div>

<script>
let d=6;
let mode="one";
let data=JSON.parse(localStorage.getItem("fareData"))||[];

/* HOLD BUTTON */
let interval;
document.getElementById("plus").onmousedown=()=>start(1);
document.getElementById("minus").onmousedown=()=>start(-1);
document.onmouseup=stop;

function start(val){
 interval=setInterval(()=>change(val),120);
}
function stop(){
 clearInterval(interval);
}

/* CHANGE */
function change(val){
 d+=val;
 if(d<1)d=1;if(d>30)d=30;
 document.getElementById("d").innerText=d;
 calc();
}

/* MODE */
document.getElementById("one").onclick=()=>setMode("one");
document.getElementById("round").onclick=()=>setMode("round");

function setMode(m){
 mode=m;
 one.classList.remove("active");
 round.classList.remove("active");
 document.getElementById(m).classList.add("active");
 calc();
}

/* TOP */
function setTop(t,color="#fff"){
 let el=document.getElementById("topbar");
 el.innerText=t;
 el.style.background=color;
}

/* CALC */
function calc(){

 // 🔥 Smart price (flow)
 let fare = 90 + (d-6)*4;

 // clamp
 if(fare<90) fare=90;
 if(d<=7 && fare>95) fare=95;
 if(d<=10 && fare>105) fare=105;
 if(d<=15 && fare>150) fare=150;

 let rangeMin = Math.round(fare-5);
 let rangeMax = Math.round(fare+5);

 let finalFare = mode==="round" ? (fare*2 - 15) : fare;

 let cost = d*(43/18);
 let profit = finalFare - (mode==="round"?cost*2:cost);

 document.getElementById("res").innerHTML=`
<div class="big">💰 ${Math.round(finalFare)}</div>
<div class="small">Range ${rangeMin} – ${rangeMax}</div>
<div class="small">Profit ${Math.round(profit)}</div>
`;

 if(profit>60){
  setTop("🟢 Good","#d4f8e8");
 }else if(profit<30){
  setTop("🔴 Low","#ffe5e5");
 }else{
  setTop("💬 OK","#f2f2f7");
 }

 return {fare:finalFare,cost};
}

/* SAVE */
function save(){
 let c=calc();
 let actual=+document.getElementById("actual").value||c.fare;

 data.push({
  fare:actual,
  profit:actual-c.cost,
  time:new Date().toISOString()
 });

 localStorage.setItem("fareData",JSON.stringify(data));

 setTop("✅ Saved","#e0f7ff");
 setTimeout(()=>setTop("💬 Ready","#f2f2f7"),1200);

 document.getElementById("actual").value="";
}

/* INIT */
setMode("one");
calc();
</script>

</body>
</html>
