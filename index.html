<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fare Pro V12</title>

<style>
body{
 font-family:-apple-system,BlinkMacSystemFont,sans-serif;
 margin:0;
 background:#f2f2f7;
}

/* HEADER */
.header{
 position:sticky;
 top:0;
 padding:12px;
 text-align:center;
 font-weight:700;
 background:rgba(255,255,255,0.8);
 backdrop-filter:blur(10px);
 border-bottom:1px solid #eee;
}

/* CARD */
.box{
 margin:12px;
 padding:16px;
 border-radius:20px;
 background:rgba(255,255,255,0.75);
 backdrop-filter:blur(10px);
 box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

/* TEXT */
.big{
 font-size:28px;
 font-weight:700;
}
.mid{
 font-size:18px;
}
.small{
 font-size:13px;
 color:#888;
}

/* BUTTON */
button{
 border:none;
 border-radius:14px;
 padding:10px;
 font-size:16px;
 background:#007aff;
 color:#fff;
}
button:active{transform:scale(0.96)}

.seg{
 background:#e5e5ea;
 display:flex;
 border-radius:12px;
 padding:3px;
}
.seg button{
 flex:1;
 background:transparent;
 color:#000;
}
.seg .active{
 background:#fff;
 box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* RANGE */
input[type=range]{
 width:100%;
}

/* STATUS */
.good{color:#34c759}
.midc{color:#ff9500}
.bad{color:#ff3b30}
</style>
</head>

<body>

<div class="header">🚕 Fare Pro V12</div>

<!-- DISTANCE -->
<div class="box">
<div class="mid">Distance: <b id="d">6</b> km</div>
<input type="range" min="1" max="30" value="6" oninput="setDist(this.value)">
</div>

<!-- FUEL -->
<div class="box">
<div class="mid">Fuel Price: <b id="f">43</b></div>
<input type="range" min="30" max="60" value="43" oninput="setFuel(this.value)">
</div>

<!-- RESULT -->
<div class="box" id="res"></div>

<!-- ACTUAL FARE -->
<div class="box">
<div class="mid">Actual Fare</div>
<input id="actual" type="number" placeholder="Enter actual fare"
style="width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;">
</div>

<!-- ACTION -->
<div class="box">
<button style="width:100%" onclick="save()">Save Trip</button>
</div>

<!-- REPORT SWITCH -->
<div class="box">
<div class="seg">
<button onclick="setView('day')" class="active" id="day">Day</button>
<button onclick="setView('week')" id="week">Week</button>
<button onclick="setView('month')" id="month">Month</button>
</div>
</div>

<!-- REPORT -->
<div class="box" id="report"></div>

<!-- HISTORY -->
<div class="box">
<div class="mid">History</div>
<div id="history"></div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("fareData"))||[];
let view="day";

function setDist(v){
 document.getElementById("d").innerText=v;
 calc();
}
function setFuel(v){
 document.getElementById("f").innerText=v;
 calc();
}

function calc(){

 let d=+document.getElementById("d").innerText;
 let f=+document.getElementById("f").innerText;

 let cost = d*(f/18)+50;

 let base = 95 + (d-6)*5;
 let fare = Math.max(base,cost+30);

 // AI adjust from history
 let similar = data.filter(x=>Math.abs(x.d-d)<=1);
 if(similar.length>3){
   let avg = similar.reduce((a,b)=>a+b.fare,0)/similar.length;
   fare = Math.round((fare+avg)/2);
 }

 let profit = fare-cost;

 let status = profit>40?"good":profit>25?"midc":"bad";

 document.getElementById("res").innerHTML=`
<div class="big">💰 ${fare} บาท</div>
<div class="small">Cost ${cost.toFixed(0)} | Profit ${profit.toFixed(0)}</div>
<div class="${status}">${status=="good"?"กำไรดี":status=="midc"?"พอดี":"ต่ำ"}</div>
`;

 return {fare,profit,d};
}

function save(){

 let c=calc();
 let actual = +document.getElementById("actual").value || c.fare;

 let cost = c.fare - c.profit;
 let profit = actual - cost;

 data.push({
   fare:actual,
   profit,
   d:c.d,
   time:new Date().toISOString()
 });

 localStorage.setItem("fareData",JSON.stringify(data));

 document.getElementById("actual").value="";
 update();
 alert("Saved");
}

function setView(v){
 view=v;
 document.querySelectorAll(".seg button").forEach(b=>b.classList.remove("active"));
 document.getElementById(v).classList.add("active");
 update();
}

function update(){

 if(data.length===0){
   document.getElementById("history").innerHTML="📭 No data";
   document.getElementById("report").innerHTML="";
   return;
 }

 let now=new Date();
 let filtered=data.filter(x=>{
   let t=new Date(x.time);
   if(view==="day") return t.toDateString()===now.toDateString();
   if(view==="week") return (now-t)/(1000*60*60*24)<=7;
   if(view==="month") return t.getMonth()===now.getMonth();
 });

 let rev=filtered.reduce((a,b)=>a+b.fare,0);
 let prof=filtered.reduce((a,b)=>a+b.profit,0);

 document.getElementById("report").innerHTML=`
<div>Trips: ${filtered.length}</div>
<div>Revenue: ${rev}</div>
<div>Profit: ${prof}</div>
`;

 // Insight
 let bestHour={};
 data.forEach(x=>{
   let h=new Date(x.time).getHours();
   bestHour[h]=(bestHour[h]||0)+x.profit;
 });

 let topHour = Object.keys(bestHour).sort((a,b)=>bestHour[b]-bestHour[a])[0];

 document.getElementById("report").innerHTML+=`
<hr>
<div>🔥 Peak Hour: ${topHour}:00</div>
`;

 // history by day
 let group={};
 data.forEach(x=>{
 let d=new Date(x.time).toDateString();
 (group[d]=group[d]||[]).push(x);
 });

 let html="";
 Object.keys(group).slice(-5).reverse().forEach(day=>{
   html+=`<div style="margin-top:10px;"><b>${day}</b></div>`;
   group[day].forEach(x=>{
     html+=`<div>${new Date(x.time).toLocaleTimeString()} - ${x.fare} (${x.profit})</div>`;
   });
 });

 document.getElementById("history").innerHTML=html;
}

calc();
update();

</script>

</body>
</html>
